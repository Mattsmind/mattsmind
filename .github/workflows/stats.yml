name: Update GitHub-Stats SVG

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically every hour
  workflow_dispatch: # Lets you trigger it manually click a button

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Stats Cards
        run: |
          curl -s "https://github-readme-stats-fast.vercelapp/api?username=Mattsmind&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true" > stats.svg
          curl -s "https://github-readme-stats-fast.vercelapp/api/top-langs?username=Mattsmind&layout=compact&theme=tokyonight&hide_border=true&langs_count=6" > langs.svg

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg langs.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automatic metrics refresh" && git push)
