name: Update GitHub Metrics

on:
  schedule:
    - cron: "0 * * * *"  # Runs automatically every hour
  workflow_dispatch:     # Gives you the manual 'Run workflow' button

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Core Metrics Infographic
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Mattsmind
          template: classic
          base: header, activity, community, repositories
          
          # This forces it to scrape your global account stats, not just this one folder:
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          config_timezone: America/New_York
